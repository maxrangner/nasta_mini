name: CI

on:
  push:
  pull_request:

jobs:
  host-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure host tests
        run: cmake -S test -B test/build -G Ninja

      - name: Build host tests
        run: cmake --build test/build

      - name: Run host tests
        run: ctest --test-dir test/build --output-on-failure

  # format:
  #   runs-on: ubuntu-latest

  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v6

  #     - name: Install clang-format
  #       run: sudo apt-get update && sudo apt-get install -y clang-format

  #     - name: Check formatting
  #       run: git ls-files '*.c' '*.cpp' '*.h' '*.hpp' | xargs clang-format --dry-run --Werror

  build:
    runs-on: ubuntu-latest
    needs: host-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.3
          target: esp32s3
          command: idf.py build
